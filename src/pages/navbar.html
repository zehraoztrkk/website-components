<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yatay Menü - Dil Değiştirme</title>
  <link rel="stylesheet" href="../../public/assets/css/navbar.css" />
</head>
<body>

  <header class="navbar">
    <div class="logo">
      <img src="../..//public/assets/images/gameflex.png" alt="Logo" />
    </div>

    <nav class="nav-links">
      <a href="home.html" data-key="home">Home</a>
      <a href="about.html" data-key="about">About</a>
      <a href="services.html" data-key="services">Services</a>
      <a href="contact.html" data-key="contact">Contact</a>
    </nav>

    <div class="nav-actions">
      <button class="language-btn active" type="button">EN</button>
      <button class="language-btn" type="button">TR</button>
    </div>
  </header>

  <script>
    const languageButtons = document.querySelectorAll('.language-btn');
    const navLinks = document.querySelectorAll('.nav-links a');

    const translations = {
      en: {
        home: "Home",
        about: "About",
        services: "Services",
        contact: "Contact"
      },
      tr: {
        home: "Ana Sayfa",
        about: "Hakkında",
        services: "Hizmetler",
        contact: "İletişim"
      }
    };

    languageButtons.forEach(button => {
      button.addEventListener('click', () => {
        languageButtons.forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');

        const selectedLang = button.textContent.toLowerCase();

        navLinks.forEach(link => {
          const key = link.getAttribute('data-key');
          link.textContent = translations[selectedLang][key];
        });

        console.log('Seçilen dil:', selectedLang);
      });
    });
  </script>

</body>
</html>
