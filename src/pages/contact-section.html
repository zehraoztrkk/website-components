<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Section</title>
  <link rel="stylesheet" href="../../public/assets/css/contact-section.css" />
</head>
<body>

  <section class="contact-section">
    <div class="contact-card">
      <h2>İletişim</h2>
      <div class="contact-info">
        <div class="contact-item">
          <i class="fas fa-phone"></i>
          <span>+90 212 000 00 00</span>
        </div>
        <div class="contact-item">
          <i class="fas fa-envelope"></i>
          <span>info@ornekmail.com</span>
        </div>
        <div class="contact-item">
          <i class="fas fa-map-marker-alt"></i>
          <span>Barbaros, 34746 Ataşehir/İstanbul</span>
        </div>
      </div>
      <div class="contact-map">
        <iframe 
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3011.780337804588!2d29.11209397591386!3d40.99236477135878!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14cac7c2cb1f6ab1%3A0x8cf94b95b7a59742!2sBarbaros%2C%2034746%20Ata%C5%9Fehir%2F%C4%B0stanbul!5e0!3m2!1str!2str!4v1721465133952" 
          width="100%" 
          height="250" 
          style="border:0;" 
          allowfullscreen="" 
          loading="lazy" 
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </div>
    </div>
  </section>

<script src="https://kit.fontawesome.com/f56e8543ca.js" crossorigin="anonymous"></script>

<script src="../../public/assets/scripts/contact-section.js"></script>

</body>
</html>
